<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="660" viewBox="0 0 1000 660" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <rect width="1000" height="660" fill="#f1f5f9"/>

  <!-- ===== Selected tools row ===== -->
  <text x="40" y="42" font-size="14" font-weight="700" fill="#0f172a">Capabilities (Tools)</text>
  <text x="940" y="42" font-size="12" fill="#64748b" text-anchor="end">2 selected</text>
  <rect x="40" y="56" width="200" height="44" rx="11" fill="#fff" stroke="#e2e8f0"/>
  <rect x="50" y="64" width="28" height="28" rx="8" fill="#f1f5f9"/><text x="64" y="84" font-size="14" text-anchor="middle">&#129504;</text>
  <text x="86" y="78" font-size="13" font-weight="600" fill="#0f172a">Generate Content</text>
  <text x="86" y="92" font-size="9" fill="#94a3b8">llm</text>
  <text x="224" y="84" font-size="16" fill="#cbd5e1">×</text>
  <rect x="250" y="56" width="200" height="44" rx="11" fill="#fff" stroke="#e2e8f0"/>
  <rect x="260" y="64" width="28" height="28" rx="8" fill="#f1f5f9"/><text x="274" y="84" font-size="14" text-anchor="middle">&#127760;</text>
  <text x="296" y="78" font-size="13" font-weight="600" fill="#0f172a">Get Website Logo</text>
  <text x="296" y="92" font-size="9" fill="#94a3b8">web</text>
  <text x="434" y="84" font-size="16" fill="#cbd5e1">×</text>
  <rect x="460" y="56" width="120" height="44" rx="11" fill="#fff" stroke="#cbd5e1" stroke-dasharray="5 4"/>
  <text x="520" y="83" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">&#65291; Add tool</text>

  <!-- ===== Add-tool popover ===== -->
  <rect x="60" y="124" width="880" height="512" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="86" y="160" font-size="14" fill="#94a3b8">&#128269;</text>
  <text x="112" y="160" font-size="14" fill="#94a3b8">Search for tools…</text>
  <text x="910" y="162" font-size="20" fill="#cbd5e1" text-anchor="end">×</text>
  <line x1="60" y1="180" x2="940" y2="180" stroke="#f1f5f9"/>

  <!-- left categories -->
  <rect x="60" y="180" width="220" height="400" fill="#f8fafc"/>
  <line x1="280" y1="180" x2="280" y2="580" stroke="#f1f5f9"/>
  <text x="84" y="206" font-size="10" font-weight="700" letter-spacing="0.5" fill="#94a3b8">CATEGORIES</text>
  <g font-size="13" fill="#475569">
    <!-- helper: tile -->
    <rect x="84" y="220" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="236" font-size="12" text-anchor="middle">&#129504;</text><text x="116" y="236">llm</text><text x="256" y="236" font-size="10" fill="#94a3b8" text-anchor="end">4</text>
    <rect x="84" y="252" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="268" font-size="12" text-anchor="middle">&#128444;</text><text x="116" y="268">media</text><text x="256" y="268" font-size="10" fill="#94a3b8" text-anchor="end">6</text>
    <rect x="84" y="284" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="300" font-size="12" text-anchor="middle">&#128225;</text><text x="116" y="300">network</text><text x="256" y="300" font-size="10" fill="#94a3b8" text-anchor="end">5</text>
    <!-- active -->
    <rect x="72" y="316" width="196" height="30" rx="7" fill="#eef2ff"/>
    <rect x="84" y="320" width="22" height="22" rx="6" fill="#fff"/><text x="95" y="336" font-size="12" text-anchor="middle">&#128225;</text><text x="116" y="336" fill="#4f46e5" font-weight="700">signals</text><text x="256" y="336" font-size="10" fill="#94a3b8" text-anchor="end">5</text>
    <rect x="84" y="348" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="364" font-size="12" text-anchor="middle">&#128101;</text><text x="116" y="364">social</text><text x="256" y="364" font-size="10" fill="#94a3b8" text-anchor="end">8</text>
    <rect x="84" y="380" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="396" font-size="12" text-anchor="middle">&#128190;</text><text x="116" y="396">storage</text><text x="256" y="396" font-size="10" fill="#94a3b8" text-anchor="end">4</text>
    <rect x="84" y="412" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="428" font-size="12" text-anchor="middle">&#9881;</text><text x="116" y="428">system</text><text x="256" y="428" font-size="10" fill="#94a3b8" text-anchor="end">7</text>
    <rect x="84" y="444" width="22" height="22" rx="6" fill="#f1f5f9"/><text x="95" y="460" font-size="12" text-anchor="middle">&#127760;</text><text x="116" y="460">web</text><text x="256" y="460" font-size="10" fill="#94a3b8" text-anchor="end">9</text>
  </g>

  <!-- right tools -->
  <g>
    <rect x="296" y="194" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="216" font-size="16" text-anchor="middle">&#128225;</text>
    <text x="344" y="208" font-size="13" font-weight="600" fill="#0f172a">Configure Signal Bridge</text>
    <text x="344" y="224" font-size="11" fill="#64748b">Configure a Redis stream signal bridge for this agent.</text>
    <text x="918" y="214" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="end">✓ Added</text>
    <line x1="296" y1="240" x2="920" y2="240" stroke="#f8fafc"/>

    <rect x="296" y="252" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="274" font-size="16" text-anchor="middle">&#128279;</text>
    <text x="344" y="266" font-size="13" font-weight="600" fill="#0f172a">Create Webhook</text>
    <text x="344" y="282" font-size="11" fill="#64748b">Enable webhook ingestion; generates an API key and returns the URL.</text>
    <text x="916" y="272" font-size="18" fill="#cbd5e1" text-anchor="end">&#65291;</text>
    <line x1="296" y1="298" x2="920" y2="298" stroke="#f8fafc"/>

    <rect x="296" y="310" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="332" font-size="16" text-anchor="middle">&#9201;</text>
    <text x="344" y="324" font-size="13" font-weight="600" fill="#0f172a">Create Schedule</text>
    <text x="344" y="340" font-size="11" fill="#64748b">Create a recurring scheduled task (cron) that runs in the background.</text>
    <text x="916" y="330" font-size="18" fill="#cbd5e1" text-anchor="end">&#65291;</text>
    <line x1="296" y1="356" x2="920" y2="356" stroke="#f8fafc"/>

    <rect x="296" y="368" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="390" font-size="16" text-anchor="middle">&#128276;</text>
    <text x="344" y="382" font-size="13" font-weight="600" fill="#0f172a">Send Notification</text>
    <text x="344" y="398" font-size="11" fill="#64748b">Send a notification to the agent owner for critical alerts.</text>
    <text x="916" y="388" font-size="18" fill="#cbd5e1" text-anchor="end">&#65291;</text>
    <line x1="296" y1="414" x2="920" y2="414" stroke="#f8fafc"/>

    <rect x="296" y="426" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="448" font-size="16" text-anchor="middle">&#128225;</text>
    <text x="344" y="440" font-size="13" font-weight="600" fill="#0f172a">List Signals</text>
    <text x="344" y="456" font-size="11" fill="#64748b">List recent signals received by this agent with status and cost.</text>
    <text x="916" y="446" font-size="18" fill="#cbd5e1" text-anchor="end">&#65291;</text>
    <line x1="296" y1="472" x2="920" y2="472" stroke="#f8fafc"/>

    <rect x="296" y="484" width="32" height="32" rx="9" fill="#f1f5f9"/><text x="312" y="506" font-size="16" text-anchor="middle">&#128260;</text>
    <text x="344" y="498" font-size="13" font-weight="600" fill="#0f172a">Retry Signal</text>
    <text x="344" y="514" font-size="11" fill="#64748b">Re-queue a failed or dead-lettered signal for processing.</text>
    <text x="916" y="504" font-size="18" fill="#cbd5e1" text-anchor="end">&#65291;</text>
  </g>

  <!-- footer -->
  <line x1="60" y1="580" x2="940" y2="580" stroke="#f1f5f9"/>
  <rect x="60" y="580" width="880" height="56" fill="#f8fafc"/>
  <text x="86" y="613" font-size="12" fill="#64748b">2 selected</text>
  <rect x="852" y="594" width="78" height="30" rx="8" fill="#6366f1"/><text x="891" y="614" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Done</text>
</svg>
